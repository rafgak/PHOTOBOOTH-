<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FotoStudio - Cek Hasil Jepretan Kamu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            padding: 24px;
        }
        .hero {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            border-radius: 32px;
            padding: 48px 24px;
            text-align: center;
            margin-bottom: 32px;
        }
        .hero h1 { font-size: 2.2rem; color: #fff; margin-bottom: 8px; }
        .hero p { color: rgba(255,255,255,0.8); font-size: 1rem; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 16px 20px;
            font-size: 1rem;
            border: 1.5px solid #e8e0d5;
            border-radius: 48px;
            background: #fff;
            font-family: inherit;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2c3e50;
            box-shadow: 0 0 0 3px rgba(44,62,80,0.1);
        }
        .search-box button {
            padding: 0 32px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .search-box button:hover { background: #1a1a2e; }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }
        .foto-item {
            background: #fefefe;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }
        .foto-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .foto-info { padding: 16px; }
        .foto-info h4 { font-size: 1rem; color: #2c3e50; margin-bottom: 8px; }
        .foto-info .date { font-size: 0.75rem; color: #999; margin-bottom: 12px; }
        .btn-download {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .loading { text-align: center; padding: 48px; color: #999; }
        .empty-state { text-align: center; padding: 64px 24px; color: #bbb; }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 16px; }
        footer { text-align: center; padding: 24px; color: #aaa; font-size: 0.75rem; }
        @media (max-width: 600px) {
            body { padding: 16px; }
            .hero { padding: 32px 20px; }
            .hero h1 { font-size: 1.6rem; }
            .card { padding: 20px; }
            .search-box button { padding: 0 24px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>📸 FotoStudio</h1>
    <p>Cek & download hasil foto kamu di sini</p>
</div>

<div class="card">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Masukkan nama kamu...">
        <button id="searchBtn">Cari</button>
    </div>
    <div id="resultContainer"></div>
    <div id="loading" class="loading" style="display: none;">⏳ Sedang mencari...</div>
</div>

<footer>© 2025 FotoStudio • Hasil foto tersimpan selama 30 hari</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 🔧 GANTI DENGAN PUNYA LU (SUDAH BENER) 🔧
    const SUPABASE_URL = "https://fhuulpwvoyubgmnooqrf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZodXVscHd2b3l1Ymdtbm9vcXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDIzMzQsImV4cCI6MjA5NTExODMzNH0.Dm8inSoHfc1ICBcT1TVLSJWiVZ6rqdifZUtWCLAFTNw";

    let supabase = null;

    // Inisialisasi supabase
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    supabase = supabaseClient;

    document.getElementById('searchBtn').onclick = () => search();
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') search();
    });

    async function search() {
        const nama = document.getElementById('searchInput').value.trim();
        if (!nama) {
            alert('Masukkan nama dulu ya');
            return;
        }

        const container = document.getElementById('resultContainer');
        const loading = document.getElementById('loading');
        
        loading.style.display = 'block';
        container.innerHTML = '';

        try {
            const { data, error } = await supabase
                .from('hasil_foto')
                .select('*')
                .ilike('nama', `%${nama}%`)
                .order('created_at', { ascending: false });

            loading.style.display = 'none';

            if (error) throw error;

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span>📷</span>
                        <p>Wah, belum ada hasil foto untuk "${nama}"</p>
                        <p style="font-size:0.8rem">Coba cek nama lain atau coba lagi nanti</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (let item of data) {
                let fotoHtml = '';
                if (item.foto_urls && item.foto_urls.length) {
                    fotoHtml = `
                        <div class="result-grid">
                            ${item.foto_urls.map(url => `
                                <div class="foto-item">
                                    <img src="${url}" alt="foto">
                                    <div class="foto-info">
                                        <h4>📸 ${item.nama}</h4>
                                        <div class="date">${new Date(item.created_at).toLocaleDateString('id-ID')}</div>
                                        <a href="${url}" download class="btn-download">⬇️ Download</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                let gifHtml = '';
                if (item.gif_url) {
                    gifHtml = `
                        <div style="margin-top: 24px; background:#f9f9f9; border-radius:20px; padding:20px;">
                            <h4 style="margin-bottom:12px">🎬 GIF Animasi</h4>
                            <img src="${item.gif_url}" style="max-width:100%; border-radius:12px" alt="gif">
                            <div style="margin-top:12px">
                                <a href="${item.gif_url}" download class="btn-download">⬇️ Download GIF</a>
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div style="margin-bottom: 40px;">
                        <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 16px;">
                            <h3 style="font-size:1.2rem; color:#2c3e50;">${item.nama}</h3>
                            <span style="font-size:0.7rem; color:#aaa;">${new Date(item.created_at).toLocaleString('id-ID')}</span>
                        </div>
                        ${fotoHtml}
                        ${gifHtml}
                    </div>
                    <hr style="margin: 32px 0; border: none; border-top: 1px solid #eee;">
                `;
            }
            container.innerHTML = html;

        } catch (err) {
            loading.style.display = 'none';
            container.innerHTML = `<div class="empty-state"><span>⚠️</span><p>Gagal memuat, coba lagi ya</p><p style="font-size:0.7rem">${err.message}</p></div>`;
            console.error(err);
        }
    }
</script>
</body>
</html>
