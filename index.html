<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Photobooth - FotoStudio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2rem; color: #7C3AED; }
        .header p { color: #aaa; }
        
        .camera-area {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .camera-container {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .camera-overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
        }
        .capture-btn {
            background: #EF4444;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .capture-btn:hover { transform: scale(1.05); }
        
        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
        }
        
        .gallery {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .gallery h3 { margin-bottom: 15px; color: #7C3AED; }
        .photo-list {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .photo-item {
            position: relative;
            width: 100px;
            height: 100px;
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .photo-item.selected { border-color: #10B981; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-item .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #EF4444;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }
        
        .layout-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .layout-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
            flex: 1;
            min-width: 150px;
        }
        .layout-card.selected { border-color: #7C3AED; background: #2a2a3e; }
        .layout-preview {
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .frame-options {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .frame-btn {
            background: #2a2a2a;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .frame-btn.selected { background: #7C3AED; }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-primary {
            background: #7C3AED;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-success { background: #10B981; }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .photo-list { gap: 8px; }
            .photo-item { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📸 WEB PHOTOBOOTH</h1>
        <p>Ambil foto, pilih layout, upload ke server</p>
    </div>
    
    <div class="camera-area">
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <div class="camera-overlay">
                <button class="capture-btn" id="captureBtn">📸 AMBIL FOTO</button>
            </div>
        </div>
    </div>
    
    <div class="gallery" id="gallery" style="display: none;">
        <h3>📸 Foto Tersimpan (<span id="photoCount">0</span>/<span id="maxPhoto">10</span>)</h3>
        <div class="photo-list" id="photoList"></div>
        <div class="action-buttons">
            <button class="btn-primary" id="selesaiBtn">✅ SELESAI & LANJUT</button>
        </div>
    </div>
    
    <div id="layoutSection" style="display: none;">
        <div class="gallery">
            <h3>📐 Pilih Layout Cetak</h3>
            <div class="layout-options" id="layoutOptions">
                <div class="layout-card" data-layout="1strip">
                    <div>📄 1 STRIP</div>
                    <div class="layout-preview">┌─┐ ┌─┐ ┌─┐<br>│1│ │2│ │3│<br>└─┘ └─┘ └─┘</div>
                </div>
                <div class="layout-card" data-layout="2strip">
                    <div>📄 2 STRIP</div>
                    <div class="layout-preview">┌─┐ ┌─┐<br>│1│ │2│<br>├─┼─┤<br>│3│ │4│<br>└─┘ └─┘</div>
                </div>
            </div>
            
            <h3>🖼️ Pilih Bingkai</h3>
            <div class="frame-options" id="frameOptions">
                <button class="frame-btn" data-frame="Modern">Modern (Ungu)</button>
                <button class="frame-btn" data-frame="Polaroid">Polaroid (Putih)</button>
                <button class="frame-btn" data-frame="Classic">Classic (Emas)</button>
                <button class="frame-btn" data-frame="Minimalis">Minimalis (Hitam)</button>
            </div>
            
            <div class="action-buttons">
                <button class="btn-primary btn-success" id="uploadBtn">📤 UPLOAD & DAPATKAN QR</button>
            </div>
        </div>
    </div>
</div>

<div class="countdown" id="countdown">3</div>
<div class="loading" id="loading">
    <div style="text-align:center">⏳ MENGUPLOAD...<br><br><span style="font-size:12px">Mohon tunggu</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script>
(function() {
    // Konfigurasi
    const SUPABASE_URL = "https://fhuulpwvoyubgmnooqrf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZodXVscHd2b3l1Ymdtbm9vcXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDIzMzQsImV4cCI6MjA5NTExODMzNH0.Dm8inSoHfc1ICBcT1TVLSJWiVZ6rqdifZUtWCLAFTNw";
    const WEB_URL = "https://photoboothsmamip.vercel.app";
    const MAX_PHOTOS = 10;
    
    let supabase = null;
    let stream = null;
    let photos = [];
    let selectedLayout = "2strip";
    let selectedFrame = "Modern";
    let sessionId = Math.random().toString(36).substring(2, 10);
    
    // Inisialisasi Supabase
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // DOM Elements
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const countdownDiv = document.getElementById('countdown');
    const gallery = document.getElementById('gallery');
    const photoList = document.getElementById('photoList');
    const photoCountSpan = document.getElementById('photoCount');
    const maxPhotoSpan = document.getElementById('maxPhoto');
    const selesaiBtn = document.getElementById('selesaiBtn');
    const layoutSection = document.getElementById('layoutSection');
    const uploadBtn = document.getElementById('uploadBtn');
    const loadingDiv = document.getElementById('loading');
    
    maxPhotoSpan.textContent = MAX_PHOTOS;
    
    // Akses kamera
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            console.log('Camera started');
        } catch (err) {
            alert('Gagal akses kamera: ' + err.message + '\n\nPastikan izin kamera diberikan dan menggunakan HTTPS (localhost atau Vercel)');
            console.error(err);
        }
    }
    
    // Ambil foto
    function capturePhoto() {
        if (photos.length >= MAX_PHOTOS) {
            alert(`Maksimal ${MAX_PHOTOS} foto!`);
            return;
        }
        
        let count = 3;
        countdownDiv.style.display = 'block';
        countdownDiv.textContent = count;
        
        const interval = setInterval(() => {
            count--;
            countdownDiv.textContent = count;
            if (count <= 0) {
                clearInterval(interval);
                countdownDiv.style.display = 'none';
                
                // Ambil frame dari video
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                // Gambar video (udah mirror dari CSS)
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Mirror balik (karena CSS sudah flip)
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const photoUrl = canvas.toDataURL('image/png');
                photos.push(photoUrl);
                updateGallery();
                
                // Flash effect
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = 0;
                flash.style.left = 0;
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.backgroundColor = 'white';
                flash.style.zIndex = 999;
                flash.style.pointerEvents = 'none';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 150);
            }
        }, 1000);
    }
    
    // Update gallery
    function updateGallery() {
        gallery.style.display = 'block';
        photoCountSpan.textContent = photos.length;
        
        if (photos.length === 0) {
            photoList.innerHTML = '<div style="color:#aaa">Belum ada foto</div>';
            return;
        }
        
        photoList.innerHTML = photos.map((photo, idx) => `
            <div class="photo-item" data-idx="${idx}">
                <img src="${photo}" alt="foto ${idx+1}">
                <div class="delete-btn" onclick="window.deletePhoto(${idx})">✕</div>
            </div>
        `).join('');
    }
    
    // Hapus foto (global)
    window.deletePhoto = function(idx) {
        photos.splice(idx, 1);
        updateGallery();
    };
    
    // Selesai foto
    selesaiBtn.onclick = () => {
        if (photos.length === 0) {
            alert('Ambil minimal 1 foto!');
            return;
        }
        gallery.style.display = 'none';
        layoutSection.style.display = 'block';
    };
    
    // Pilih layout
    document.querySelectorAll('.layout-card').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.layout-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedLayout = el.dataset.layout;
        };
    });
    document.querySelector('.layout-card').classList.add('selected');
    
    // Pilih bingkai
    document.querySelectorAll('.frame-btn').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.frame-btn').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedFrame = el.dataset.frame;
        };
    });
    document.querySelector('.frame-btn').classList.add('selected');
    
    // Upload
    uploadBtn.onclick = async () => {
        if (photos.length === 0) {
            alert('Tidak ada foto untuk diupload!');
            return;
        }
        
        loadingDiv.style.display = 'flex';
        
        try {
            const fotoUrls = [];
            const timestamp = Date.now();
            
            for (let i = 0; i < photos.length; i++) {
                // Convert base64 ke blob
                const response = await fetch(photos[i]);
                const blob = await response.blob();
                
                const filename = `${sessionId}_${timestamp}_${i}.png`;
                const { error } = await supabase.storage.from('foto').upload(filename, blob);
                if (error) throw error;
                
                const { data } = supabase.storage.from('foto').getPublicUrl(filename);
                fotoUrls.push(data.publicUrl);
            }
            
            // Simpan ke database
            const data = {
                nama: "Pelanggan",
                foto_urls: fotoUrls,
                layout: selectedLayout,
                frame: selectedFrame,
                session_id: sessionId,
                created_at: new Date().toISOString()
            };
            
            const { error } = await supabase.from('hasil_foto').insert([data]);
            if (error) throw error;
            
            // Tampilkan hasil
            loadingDiv.style.display = 'none';
            showQRResult();
            
        } catch (err) {
            loadingDiv.style.display = 'none';
            alert('Error: ' + err.message);
        }
    };
    
    function showQRResult() {
        document.body.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f0f0f; color: white; padding: 20px; text-align: center;">
                <h1 style="color: #10B981; margin-bottom: 20px;">✅ UPLOAD BERHASIL!</h1>
                <p style="margin-bottom: 20px;">${photos.length} foto berhasil diupload</p>
                <canvas id="qrCanvas" style="margin-bottom: 20px;"></canvas>
                <p style="margin-bottom: 10px;">Scan QR untuk lihat hasil:</p>
                <p style="font-size: 12px; color: #aaa; word-break: break-all;">${WEB_URL}/index.html?session=${sessionId}</p>
                <div style="margin-top: 30px;">
                    <button onclick="location.reload()" style="background: #7C3AED; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer;">📸 FOTO LAGI</button>
                </div>
            </div>
        `;
        
        const url = `${WEB_URL}/index.html?session=${sessionId}`;
        QRCode.toCanvas(document.getElementById('qrCanvas'), url, { width: 200 }, (error) => {
            if (error) console.error(error);
        });
    }
    
    // Start camera
    startCamera();
    captureBtn.onclick = capturePhoto;
})();
</script>
</body>
</html>
