<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FotoStudio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f0ee;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            background: #2c3e50;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .login-card {
            max-width: 350px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
        }
        .login-card button, .btn-refresh {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .foto-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .foto-info h3 { font-size: 1rem; }
        .foto-info p { font-size: 0.7rem; color: #999; }
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-view {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 8px;
        }
        .loading { text-align: center; padding: 40px; color: #999; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #2c3e50; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
        }
        .modal-content {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .close { cursor: pointer; font-size: 24px; }
        .modal-img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginContainer">
    <div class="login-card">
        <h2>🔐 Admin</h2>
        <input type="password" id="adminPassword" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="dashboardContainer" style="display:none;">
    <div class="container">
        <div class="header">
            <h1>📸 Dashboard</h1>
            <button id="logoutBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 16px; border-radius:20px;">Logout</button>
        </div>
        
        <div class="stat-card">
            <div class="stat-number" id="totalData">0</div>
            <div>Total Data Foto</div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari nama...">
            <button id="refreshBtn" class="btn-refresh">🔄 Refresh</button>
        </div>
        
        <div id="dataList"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Detail Foto</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        const SUPABASE_URL = "https://fhuulpwvoyubgmnooqrf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZodXVscHd2b3l1Ymdtbm9vcXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDIzMzQsImV4cCI6MjA5NTExODMzNH0.Dm8inSoHfc1ICBcT1TVLSJWiVZ6rqdifZUtWCLAFTNw";
        const ADMIN_PASSWORD = "pace123";
        
        let supabase = null;
        let allData = [];
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Login
        document.getElementById('loginBtn').onclick = () => {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginError').innerText = 'Password salah!';
            }
        };
        
        document.getElementById('logoutBtn').onclick = () => {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
        };
        
        async function loadData() {
            const container = document.getElementById('dataList');
            container.innerHTML = '<div class="loading">⏳ Loading...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('hasil_foto')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allData = data || [];
                document.getElementById('totalData').innerText = allData.length;
                renderList(allData);
                
            } catch (err) {
                container.innerHTML = `<div class="loading">❌ Error: ${err.message}</div>`;
                console.error(err);
            }
        }
        
        function renderList(data) {
            const container = document.getElementById('dataList');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="loading">📷 Belum ada data</div>';
                return;
            }
            
            container.innerHTML = data.map(item => `
                <div class="foto-card">
                    <div class="foto-info">
                        <h3>${escapeHtml(item.nama)}</h3>
                        <p>${new Date(item.created_at).toLocaleString('id-ID')}</p>
                        <p>📸 ${item.foto_urls?.length || 0} foto ${item.gif_url ? '🎬 GIF' : ''}</p>
                    </div>
                    <div>
                        <button class="btn-view" onclick="viewDetail('${item.id}')">Detail</button>
                        <button class="btn-delete" onclick="deleteData('${item.id}', '${escapeHtml(item.nama)}')">Hapus</button>
                    </div>
                </div>
            `).join('');
        }
        
        window.viewDetail = (id) => {
            const item = allData.find(d => d.id == id);
            if (!item) return;
            
            let fotoHtml = '';
            if (item.foto_urls && item.foto_urls.length) {
                fotoHtml = item.foto_urls.map(url => `<img src="${url}" class="modal-img" loading="lazy">`).join('');
            }
            
            let gifHtml = '';
            if (item.gif_url) {
                gifHtml = `<img src="${item.gif_url}" class="modal-img">`;
            }
            
            document.getElementById('modalTitle').innerHTML = `📸 ${item.nama}`;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Tanggal:</strong> ${new Date(item.created_at).toLocaleString('id-ID')}</p>
                <p><strong>Jumlah foto:</strong> ${item.foto_urls?.length || 0}</p>
                ${fotoHtml}
                ${gifHtml}
                <button onclick="closeModal()" style="margin-top:15px; padding:8px 16px; background:#2c3e50; color:white; border:none; border-radius:10px;">Tutup</button>
            `;
            document.getElementById('modal').style.display = 'block';
        };
        
        window.closeModal = () => {
            document.getElementById('modal').style.display = 'none';
        };
        
        window.deleteData = async (id, nama) => {
            if (!confirm(`Hapus data ${nama}?`)) return;
            try {
                await supabase.from('hasil_foto').delete().eq('id', id);
                alert('Data dihapus!');
                loadData();
            } catch (err) {
                alert('Gagal hapus: ' + err.message);
            }
        };
        
        document.getElementById('refreshBtn').onclick = () => {
            document.getElementById('searchInput').value = '';
            loadData();
        };
        
        document.getElementById('searchInput').onkeyup = () => {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            if (!keyword) {
                renderList(allData);
                return;
            }
            const filtered = allData.filter(item => item.nama.toLowerCase().includes(keyword));
            renderList(filtered);
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    })();
</script>
</body>
</html>
