<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FotoStudio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f0ee;
            padding: 24px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            background: #2c3e50;
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 24px;
            color: white;
        }

        .header h1 {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .header p {
            opacity: 0.7;
            font-size: 0.85rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .login-box {
            text-align: center;
        }

        .login-box input {
            width: 100%;
            max-width: 280px;
            padding: 14px 18px;
            border: 1.5px solid #e0ddd9;
            border-radius: 48px;
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .btn {
            padding: 12px 28px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 48px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #2c3e50;
        }

        .btn-primary:hover {
            background: #1a1a2e;
        }

        .btn-danger {
            background: #c0a080;
        }

        .btn-danger:hover {
            background: #a08464;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0ddd9;
            border-radius: 32px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .alert {
            margin-top: 16px;
            padding: 12px;
            border-radius: 24px;
            font-size: 0.8rem;
        }

        .alert-success {
            background: #e6f0ea;
            color: #2c5e3c;
        }

        .alert-error {
            background: #fce8e6;
            color: #b33;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .data-name {
            font-weight: 500;
        }

        .data-date {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 4px;
        }

        hr {
            margin: 24px 0;
            border: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📸 Panel Admin</h1>
        <p>Upload & manage hasil foto</p>
    </div>

    <div id="loginSection" class="card">
        <div class="login-box">
            <input type="password" id="adminPassword" placeholder="Password admin">
            <button class="btn btn-primary" id="loginBtn">Login</button>
            <div id="loginError" style="color:#b33; margin-top:12px; font-size:0.8rem;"></div>
        </div>
    </div>

    <div id="adminSection" style="display:none;">
        <div class="card">
            <form id="uploadForm">
                <div class="form-group">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="nama" placeholder="Misal: Ahmad Wijaya" required>
                </div>

                <div class="form-group">
                    <label>Upload Foto (bisa banyak)</label>
                    <input type="file" id="fotoFiles" multiple accept="image/*" style="padding: 8px;">
                </div>

                <div class="form-group">
                    <label>Upload GIF (opsional)</label>
                    <input type="file" id="gifFile" accept="image/gif" style="padding: 8px;">
                </div>

                <button type="button" class="btn btn-primary" id="uploadBtn">📤 Upload</button>
                <div id="uploadStatus"></div>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 16px; font-weight:500;">📋 Data Terbaru</h3>
            <div id="dataList" style="margin-top: 8px;">
                <p style="color:#aaa; text-align:center; padding:20px;">Belum ada data</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 🔧 GANTI DENGAN PUNYA LU 🔧
    const SUPABASE_URL = "https://fhuulpwvoyubgmnooqrf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZodXVscHd2b3l1Ymdtbm9vcXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDIzMzQsImV4cCI6MjA5NTExODMzNH0.Dm8inSoHfc1ICBcT1TVLSJWiVZ6rqdifZUtWCLAFTNw";  // <-- GANTI DENGAN ANON PUBLIC KEY!
    const ADMIN_PASSWORD = "Pace123";

    let supabase = null;

    function initSupabase() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    document.getElementById('loginBtn').onclick = () => {
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            initSupabase();
            loadData();
        } else {
            document.getElementById('loginError').innerText = 'Password salah.';
        }
    };

    document.getElementById('uploadBtn').onclick = async () => {
        const nama = document.getElementById('nama').value.trim();
        const fotoFiles = document.getElementById('fotoFiles').files;
        const gifFile = document.getElementById('gifFile').files[0];
        const statusDiv = document.getElementById('uploadStatus');

        if (!nama || fotoFiles.length === 0) {
            alert('Isi nama dan pilih minimal 1 foto');
            return;
        }

        statusDiv.innerHTML = '⏳ Uploading...';
        statusDiv.className = 'alert';

        try {
            const fotoUrls = [];
            for (let i = 0; i < fotoFiles.length; i++) {
                const file = fotoFiles[i];
                const fileName = `${Date.now()}_${i}_${file.name}`;
                const { error } = await supabase.storage.from('foto').upload(fileName, file);
                if (error) throw error;
                const { data: urlData } = supabase.storage.from('foto').getPublicUrl(fileName);
                fotoUrls.push(urlData.publicUrl);
            }

            let gifUrl = null;
            if (gifFile) {
                const gifName = `gif_${Date.now()}.gif`;
                const { error } = await supabase.storage.from('foto').upload(gifName, gifFile);
                if (!error) {
                    const { data: gifUrlData } = supabase.storage.from('foto').getPublicUrl(gifName);
                    gifUrl = gifUrlData.publicUrl;
                }
            }

            const { error: dbError } = await supabase.from('hasil_foto').insert([{
                nama: nama,
                foto_urls: fotoUrls,
                gif_url: gifUrl,
                created_at: new Date().toISOString()
            }]);

            if (dbError) throw dbError;

            statusDiv.innerHTML = '✅ Upload berhasil!';
            statusDiv.className = 'alert alert-success';
            document.getElementById('nama').value = '';
            document.getElementById('fotoFiles').value = '';
            document.getElementById('gifFile').value = '';
            loadData();

        } catch (err) {
            statusDiv.innerHTML = '❌ Gagal: ' + err.message;
            statusDiv.className = 'alert alert-error';
            console.error(err);
        }
    };

    async function loadData() {
        if (!supabase) return;
        const { data, error } = await supabase.from('hasil_foto').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const container = document.getElementById('dataList');
        if (!data || data.length === 0) {
            container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">Belum ada data</p>';
            return;
        }

        container.innerHTML = data.map(item => `
            <div class="data-item">
                <div>
                    <div class="data-name">${item.nama}</div>
                    <div class="data-date">${new Date(item.created_at).toLocaleDateString('id-ID')} • ${item.foto_urls?.length || 0} foto</div>
                </div>
                <button class="btn btn-danger" style="padding:6px 16px; background:#c0a080;" onclick="deleteData('${item.id}')">Hapus</button>
            </div>
        `).join('');
    }

    window.deleteData = async (id) => {
        if (!confirm('Yakin hapus data ini?')) return;
        const { error } = await supabase.from('hasil_foto').delete().eq('id', id);
        if (error) alert('Gagal hapus: ' + error.message);
        else loadData();
    };
</script>
</body>
</html>
